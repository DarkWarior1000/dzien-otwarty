<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDT7oalLLCVBFYPaHcZTLXMnK2wHRf_TQ",
  authDomain: "dzien-otwarty-teb.firebaseapp.com",
  projectId: "dzien-otwarty-teb",
  storageBucket: "dzien-otwarty-teb.firebasestorage.app",
  messagingSenderId: "862448117083",
  appId: "1:862448117083:web:7a675b85f36251f120e67e",
  databaseURL: "https://dzien-otwarty-teb-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ======================
// TRYB (HOST / PLAYER)
// ======================

const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");

// ======================
// QUIZ (PLAYER)
// ======================

const questions = [
  { q: "Ile kosztuje kawa miesięcznie (5 zł dziennie)?", a: 150 },
  { q: "Ile wynosi rata 1000 zł na 12 miesięcy?", a: 83 },
  { q: "Ile to 10% z 500?", a: 50 }
];

let current = 0;
let score = 0;
let playerName = "";

// ======================
// PLAYER UI
// ======================

if (mode === "player") {
  document.body.innerHTML = `
    <div style="padding:20px; color:white; font-family:sans-serif">
      <h2>Podaj nick</h2>
      <input id="nick" placeholder="Twój nick" />
      <button onclick="startGame()">Start</button>
      <div id="game"></div>
    </div>
  `;

  window.startGame = () => {
    playerName = document.getElementById("nick").value || "Gracz";
    nextQuestion();
  };

  window.answer = (val) => {
    if (val == questions[current].a) score += 100;
    current++;
    if (current < questions.length) nextQuestion();
    else finishGame();
  };

  function nextQuestion(){
    document.getElementById("game").innerHTML = `
      <h3>${questions[current].q}</h3>
      <input id="ans" type="number"/>
      <button onclick="answer(document.getElementById('ans').value)">OK</button>
    `;
  }

  function finishGame(){
    document.getElementById("game").innerHTML = `<h2>Twój wynik: ${score}</h2>`;
    push(ref(db, 'scores'), {
      name: playerName,
      score: score,
      time: Date.now()
    });
  }
}

// ======================
// HOST (LIVE RANKING)
// ======================

let scores = [];

onValue(ref(db, 'scores'), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  scores = Object.values(data)
    .sort((a,b) => b.score - a.score)
    .slice(0,10);

  renderBoard();
});

// ======================
// TWOJA ISTNIEJĄCA LOGIKA
// ======================

function renderBoard(){
  const body = document.getElementById('leaderboardBody');
  if (!body) return;

  body.innerHTML = scores.map((row, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${row.name}</td>
      <td>${row.score}</td>
    </tr>
  `).join('');
}

</script>
