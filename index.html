<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra finansowa LIVE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1f44;
  color:white;
  text-align:center;
}

/* ekran */
.screen{display:none}
.active{display:block}

/* przyciski */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  margin:8px;
  cursor:pointer;
  font-size:16px;
}

/* pytania */
.option{
  display:block;
  margin:10px auto;
  background:#123a7a;
  color:white;
}

/* podium */
.podium{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.card{
  padding:20px;
  background:#123a7a;
  border-radius:15px;
  width:120px;
  animation:pop 0.5s ease;
}

@keyframes pop{
  from{transform:scale(0.8)}
  to{transform:scale(1)}
}

.avatar{
  font-size:30px;
}

.gold{background:gold;color:black}
.silver{background:silver;color:black}
.bronze{background:#cd7f32;color:black}

</style>
</head>

<body>

<!-- START -->
<div id="start" class="screen active">
  <h1>💰 Gra finansowa</h1>
  <button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <h2>Twój wynik</h2>
  <h1 id="score"></h1>
  <button onclick="sendResult()">Wyślij wynik</button>
</div>

<!-- HOST -->
<div id="host" class="screen">
  <h1>🏆 Ranking LIVE</h1>
  <div class="podium">
    <div id="p2" class="card silver"></div>
    <div id="p1" class="card gold"></div>
    <div id="p3" class="card bronze"></div>
  </div>
</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDT7oalLLCVBFYPaHcZTLXMnK2wHRf_TQ",
  authDomain: "dzien-otwarty-teb.firebaseapp.com",
  projectId: "dzien-otwarty-teb",
  databaseURL: "https://dzien-otwarty-teb-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🧠 PYTANIA (5!)
const questions = [
  {q:"Wybierz mieszkanie", a:[
    {t:"Kawalerka", p:10},
    {t:"Pokój", p:20},
    {t:"Z rodzicami", p:30}
  ]},
  {q:"Ile wydajesz dziennie?", a:[
    {t:"50 zł", p:10},
    {t:"30 zł", p:20},
    {t:"10 zł", p:30}
  ]},
  {q:"Transport?", a:[
    {t:"Taxi", p:10},
    {t:"Autobus", p:20},
    {t:"Rower", p:30}
  ]},
  {q:"Telefon się psuje", a:[
    {t:"Kupuję nowy", p:10},
    {t:"Naprawiam", p:20},
    {t:"Czekam", p:30}
  ]},
  {q:"Zostało Ci 500 zł", a:[
    {t:"Wydaję", p:10},
    {t:"Oszczędzam", p:30},
    {t:"Inwestuję", p:40}
  ]}
];

let i = 0;
let score = 0;

// 🎮 START
window.startGame = function(){
  show("game");
  nextQuestion();
}

function nextQuestion(){
  if(i >= questions.length){
    show("result");
    document.getElementById("score").innerText = score + " pkt";
    return;
  }

  const q = questions[i];
  document.getElementById("question").innerText = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.a.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt.t;
    btn.onclick = ()=>{
      score += opt.p;
      i++;
      nextQuestion();
    }
    answers.appendChild(btn);
  });
}

// 📤 WYŚLIJ WYNIK
window.sendResult = function(){
  const name = prompt("Podaj nick:");
  if(!name) return;

  push(ref(db,"scores"),{
    name:name,
    score:score
  });

  alert("Wysłano!");
}

// 📡 LIVE RANKING
onValue(ref(db,"scores"), snap=>{
  const data = snap.val();
  if(!data) return;

  const arr = Object.values(data);
  arr.sort((a,b)=>b.score-a.score);

  renderPodium(arr);
});

function avatar(name){
  return "👤";
}

// 🏆 PODIUM
function renderPodium(list){

  document.getElementById("p1").innerHTML =
    list[0] ? `${avatar()}<br>${list[0].name}<br>${list[0].score}` : "";

  document.getElementById("p2").innerHTML =
    list[1] ? `${avatar()}<br>${list[1].name}<br>${list[1].score}` : "";

  document.getElementById("p3").innerHTML =
    list[2] ? `${avatar()}<br>${list[2].name}<br>${list[2].score}` : "";
}

// 🔁 SCREEN SWITCH
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// AUTO HOST MODE
if(window.location.search.includes("mode=host")){
  show("host");
}

</script>

</body>
</html>
